name: Release Scout Plugin

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Checkout main branch
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update version in scout.php
        run: |
          sed -i 's/Version: [0-9]\+\.[0-9]\+\.[0-9]\+/Version: ${{ steps.version.outputs.version }}/g' scout.php
          sed -i "s/define('SCOUT_VERSION', '[0-9]\+\.[0-9]\+\.[0-9]\+')/define('SCOUT_VERSION', '${{ steps.version.outputs.version }}')/g" scout.php

      - name: Update version in composer.json
        run: |
          sed -i 's/"version": "[0-9]\+\.[0-9]\+\.[0-9]\+"/"version": "${{ steps.version.outputs.version }}"/g' composer.json

      - name: Update version badge in README
        run: |
          sed -i "s/!\[Version\].*badge\/v.*-blue/![Version](https:\/\/img.shields.io\/badge\/v${{ steps.version.outputs.version }}-blue/g" README.md

      - name: Commit and push version updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scout.php composer.json README.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}" || echo "No changes to commit"
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            scout.php
            composer.json
            README.md
            scout.php
            includes/**
            assets/**
          body: |
            ## Scout Plugin v${{ steps.version.outputs.version }}
            
            ### Installation
            - Download the release files
            - SFTP to your WordPress site: `wp-content/plugins/scout/`
            - Activate in WordPress admin
            
            ### Updates
            Scout automatically checks this repository for new releases. WordPress sites with Scout installed will show an update notification when new versions are available.
            
            For changelog details, see the commit history.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
