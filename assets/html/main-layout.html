<div class="flex gap-3 items-stretch">
    <div
        class="flex flex-col w-full flex-shrink-0 max-w-lg h-screen bg-gradient-to-br from-slate-50 via-white to-blue-50 relative overflow-hidden rounded-lg shadow-lg"
        style="height: 94vh !important"
    >
        <!-- Header -->
        <div
            class="text-center px-6 py-4 border-b border-cyan-200/50 bg-white/70 backdrop-blur-sm z-10"
        >
            <h2 class="text-4xl font-bold mb-0">
                <span
                    class="bg-gradient-to-r from-cyan-400 via-cyan-500 to-blue-500 bg-clip-text text-transparent"
                    >Scout</span
                >
            </h2>
        </div>

        <!-- Selector Phase -->
        <div
            id="selectorPhase"
            class="flex flex-col items-center justify-center flex-1 px-3 py-10 z-10"
        >
            <label
                for="postType"
                class="block mb-2 font-semibold text-gray-800 text-md"
                >Select Content Type:</label
            >
            <div
                class="max-w-md text-center mb-8 text-gray-500 text-xs leading-relaxed"
            >
                Choose the type of page you want to create. Scout will use AI to
                generate a first draft using your site's available content
                blocks. From there you will be able to customize and refine the
                content in the WordPress editor.
            </div>
            <select
                id="postType"
                class="!w-full !max-w-md !px-4 !py-3 !mb-6 !border-1 !border-gray-100 !rounded-xl !text-md !bg-white !appearance-none !text-gray-900 !cursor-pointer !transition-all !shadow-md !hover:border-cyan-400 !hover:shadow-lg !focus:border-cyan-400 !focus:shadow-xl !focus:outline-none"
            >
                <option value="">Choose a content type...</option>
            </select>
            <button
                id="selectButton"
                class="w-full max-w-md px-10 py-3 bg-gradient-to-r from-cyan-400 to-cyan-600 text-white rounded-xl font-bold uppercase tracking-widest transition-all shadow-lg hover:shadow-2xl hover:-translate-y-1 active:translate-y-0 relative overflow-hidden group"
            >
                <span
                    class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent group-hover:animate-shimmer"
                ></span>
                <span class="relative">Begin</span>
            </button>
        </div>

        <!-- Chat Phase -->
        <div
            id="chatPhase"
            class="flex flex-col flex-1 bg-transparent overflow-scroll z-10"
            style="display: none"
        >
            <div
                id="typeBadge"
                class="px-6 py-4 bg-gradient-to-r from-cyan-50/70 to-purple-50/50 border-b border-cyan-200/30 text-xs text-gray-600 font-bold uppercase tracking-widest bg-white/60 backdrop-blur-sm"
            ></div>
            <div
                id="chat"
                class="flex-1 overflow-y-auto px-6 py-6 flex flex-col gap-8 bg-transparent"
            ></div>
            <div
                class="px-6 py-5 border-t border-cyan-200/30 bg-white/70 backdrop-blur-sm z-10"
            >
                <div class="flex gap-3 items-end">
                    <div class="flex-1 relative">
                        <textarea
                            id="input"
                            class="w-full px-4 py-3 pr-12 border-2 border-gray-300 rounded-xl font-normal text-xs leading-relaxed resize-none max-h-32 bg-white text-gray-900 transition-all shadow-sm hover:border-cyan-400 hover:shadow-md focus:border-cyan-400 focus:shadow-lg focus:outline-none"
                            placeholder="Describe the content you want..."
                        ></textarea>
                        <button
                            id="send"
                            class="absolute right-3 bottom-3 w-8 h-8 bg-gradient-to-r from-cyan-400 to-cyan-600 text-white rounded-full font-bold text-lg flex items-center justify-center transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5 active:translate-y-0"
                        >
                            ↑
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div
            id="loading"
            class="hidden items-center justify-center px-5 py-5 text-gray-600 gap-2 z-10"
        >
            <p class="text-sm font-medium tracking-widest">
                Generating draft...
            </p>
        </div>
    </div>
    <div
        id="previewWindow"
        class="flex flex-1 h-full flex-col items-center justify-center bg-gradient-to-br from-blue-50 via-cyan-50 to-blue-100 relative overflow-hidden rounded-lg shadow-lg"
        style="height: 94vh !important"
    ></div>
</div>
